<div
  class="relative w-full h-[450px] md:h-[500px] bg-cover bg-center flex items-center"
  [ngStyle]="{ 'background-image': 'url(' + imageUrl + ')' }"
>
  <!-- Overlay -->
  <div class="absolute inset-0 bg-white/70"></div>

  <!-- Content -->
  <div class="relative z-10 w-full px-6 md:px-16 flex justify-end">
    <div class="max-w-md text-right space-y-4">
      <p class="text-sm text-gray-500 uppercase tracking-wider">New Product</p>

      <h2 class="text-3xl md:text-4xl font-bold text-gray-800 leading-tight">
        {{ title }}
      </h2>

      <h3 class="text-xl md:text-2xl font-semibold text-gray-600">
        {{ subtitle }}
      </h3>

      <button
        class="mt-4 bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg transition duration-300 shadow-md"
      >
        {{ buttonText }}
      </button>
    </div>
  </div>
</div>
