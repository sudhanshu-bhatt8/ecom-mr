<div class="w-70 mx-auto px-6 mt-12">
  <!-- HEADER -->
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-semibold">Shop By Categories</h2>
    <span class="text-green-500 text-sm cursor-pointer">See All</span>
  </div>

  <!-- CATEGORY TABS -->
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-6 mb-10">
    @for (cat of category; track cat.id) {
      <div
        (click)="selectCategory(cat.id)"
        class="border rounded-lg p-6 text-center cursor-pointer transition-all"
        [ngClass]="{
          'border-green-500 bg-green-50': selectedCategoryId === cat.id,
          'border-gray-200 bg-white': selectedCategoryId !== cat.id,
        }"
      >
        <mat-icon class="text-3xl mb-3 text-gray-600">
          {{ cat.icon }}
        </mat-icon>

        <p class="font-medium text-sm">
          {{ cat.name }}
        </p>
      </div>
    }
  </div>

  <!-- PRODUCTS GRID -->
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6">
    @for (item of filteredProducts; track item.id) {
      <mat-card class="shadow-none border rounded-lg p-3 relative">
        <!-- BADGE -->
        @if (item.badge) {
          <span
            class="absolute top-3 left-3 text-xs px-2 py-1 rounded text-white"
            [ngClass]="{
              'bg-green-500': item.badge === 'new',
              'bg-orange-500': item.badge === 'sale',
              'bg-yellow-400 text-black': item.badge === 'hot',
            }"
          >
            {{ item.badge | titlecase }}
          </span>
        }

        <!-- IMAGE -->
        <div class="aspect-square bg-gray-100 rounded mb-3 flex items-center justify-center">
          <img [src]="item.image" alt="" class="max-h-28 object-contain" />
        </div>

        <!-- TITLE -->
        <p class="text-sm font-medium line-clamp-2 mb-1">
          {{ item.title }}
        </p>

        <!-- PRICE -->
        <div class="text-sm font-semibold">${{ item.price }}</div>

        @if (item.oldPrice) {
          <div class="text-xs text-gray-400 line-through">${{ item.oldPrice }}</div>
        }
      </mat-card>
    }
  </div>
</div>
