<div class="bg-black">
  <div class="max-w-[1680px] mx-auto px-6 flex items-center justify-between h-20">
    <!-- Logo -->
    <div class="text-white text-2xl font-semibold">Website</div>

    <!-- Search Panel -->
    <div class="flex items-center bg-white rounded-md overflow-hidden h-12 w-[600px]">
      <input
        type="text"
        placeholder="What are you looking for?"
        class="flex-1 px-4 text-sm outline-none text-gray-700"
      />

      <div
        class="border-l border-gray-200 px-4 text-sm text-gray-600 bg-gray-50 h-full flex items-center cursor-pointer"
      >
        Category
      </div>

      <button class="bg-green-500 hover:bg-green-600 text-white text-sm font-medium px-6 h-full">
        Search
      </button>
    </div>

    <!-- Right Icons -->
    <div class="flex items-center gap-6 text-white">
      <mat-icon class="cursor-pointer">favorite_border</mat-icon>

      <div class="relative cursor-pointer">
        <mat-icon>shopping_cart</mat-icon>
        <span
          class="absolute -top-2 -right-2 bg-orange-500 text-white text-xs px-1.5 py-0.5 rounded-full"
        >
          3
        </span>
      </div>
    </div>
  </div>
</div>
