<div class="bg-gray-100 border-t border-gray-200">
  <div class="max-w-[1680px] mx-auto px-6 h-12 flex items-center gap-8 text-sm text-gray-700">
    <div class="flex items-center gap-2 cursor-pointer">
      <mat-icon class="text-base">menu</mat-icon>
      Category
    </div>

    <div class="flex items-center gap-8">
      <ng-container *ngFor="let item of navItems">
        <div class="flex items-center gap-2 cursor-pointer hover:text-black relative">
          <span>{{ item.label }}</span>

          @if (item.isHot) {
            <span class="bg-orange-500 text-white text-xs px-2 py-0.5 rounded-full"> HOT </span>
          }
        </div>
      </ng-container>
    </div>
  </div>
</div>
