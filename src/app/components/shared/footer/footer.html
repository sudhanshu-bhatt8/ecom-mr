<footer class="bg-black text-gray-300 mt-20">
  <div class="max-w-[1680px] mx-auto px-6 py-16">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12">
      @for (column of footerColumns; track column.title) {
        <div>
          <!-- TITLE -->
          <h3 class="text-white text-lg font-semibold mb-8">
            {{ column.title }}
          </h3>

          <!-- LINKS -->
          <div class="space-y-4 text-sm leading-6">
            @for (link of column.links; track link.label) {
              <p
                class="cursor-pointer transition"
                [ngClass]="{
                  'text-green-500 hover:text-green-400': link.highlight,
                  'hover:text-white': !link.highlight,
                }"
              >
                {{ link.label }}
              </p>
            }
          </div>
        </div>
      }
    </div>
  </div>
</footer>
